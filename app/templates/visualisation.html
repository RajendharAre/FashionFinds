{% extends "base.html" %}
{% block title %}Analytics - Fashion Finds{% endblock %}
{% block content %}
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<div class="analytics-page">
    <div class="analytics-header">
        <h1><i class="fas fa-chart-bar"></i> Analytics & Reports</h1>
    </div>
    <div class="analytics-layout">
        <div class="analytics-sidebar">
            <a href="{{ url_for('admin.order_status') }}" class="analytics-nav-link">
                <i class="fas fa-chart-pie"></i> Order Status
            </a>
            <a href="{{ url_for('admin.user_types') }}" class="analytics-nav-link">
                <i class="fas fa-users"></i> User Types
            </a>
            <a href="{{ url_for('admin.order_location') }}" class="analytics-nav-link">
                <i class="fas fa-map-marker-alt"></i> Order Location
            </a>
            <a href="{{ url_for('admin.revenue') }}" class="analytics-nav-link">
                <i class="fas fa-dollar-sign"></i> Revenue
            </a>
            <a href="{{ url_for('admin.inventory') }}" class="analytics-nav-link">
                <i class="fas fa-warehouse"></i> Inventory
            </a>
        </div>
        <div class="analytics-content">
            {% if error %}
            <div class="analytics-error">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Error: {{ error }}</p>
            </div>
            {% else %}
            <div class="analytics-chart" id="chart"></div>
            <script>
                var graph = {{ graphJSON | safe }};
                Plotly.newPlot('chart', graph.data, graph.layout, {responsive: true});
            </script>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
