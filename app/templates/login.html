{% extends 'base.html' %}

{% block title %}Login - Fashion Finds{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}?v={{ range(1, 1000) | random }}">
{% endblock %}

{% block content %}
<div class="auth-form">
    <form method="POST" class="login-form">
        <h3 class="form-title">Welcome Back</h3>
        
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
        </div>
        
        <div class="form-group password-field">
            <label for="password" class="form-label">Password</label>
            <div class="password-input-container">
                <input type="password" id="password" name="password" class="form-control password-input" required placeholder="Enter your password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Login</button>
        
        <div class="auth-links">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}" class="auth-link">Register here</a></p>
            <p><a href="{{ url_for('auth.forgot_password') }}" class="auth-link">Forgot Password?</a></p>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Password toggle functionality
    const passwordToggles = document.querySelectorAll('.password-toggle');
    
    passwordToggles.forEach(toggle => {
        toggle.addEventListener('click', function() {
            const input = this.previousElementSibling;
            const icon = this.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    });
});
</script>
{% endblock %}
