{% extends 'base.html' %}

{% block title %}Forgot Password - Fashion Finds{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}?v={{ range(1, 1000) | random }}">
{% endblock %}

{% block content %}
<div class="auth-form">
    <form method="POST" class="forgot-password-form">
        <h3 class="form-title">Reset Your Password</h3>
        <p class="form-description">Enter your email address and we'll send you a link to reset your password.</p>
        

        
        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
        </div>
        
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
        
        <div class="auth-links">
            <p><a href="{{ url_for('auth.login') }}" class="auth-link">Back to Login</a></p>
        </div>
    </form>
</div>
{% endblock %}
