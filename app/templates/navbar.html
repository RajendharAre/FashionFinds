<div class="nav-container">
    <nav class="navbar">
        <!-- Logo -->
        <a href="/" class="logo">
            <i class="fas fa-shopping-bag"></i>
            <span class="logo-text">FASHION FINDS</span>
        </a>

        <!-- Main Navigation -->
        <div class="main-nav">
            <a href="/" class="nav-item" data-page="home" title="Home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="{{ url_for('views.products_by_category', category_name='Men') }}" class="nav-item" title="Men">
                <i class="fas fa-male"></i><span>Men</span>
            </a>
            <a href="{{ url_for('views.products_by_category', category_name='Women') }}" class="nav-item" title="Women">
                <i class="fas fa-female"></i><span>Women</span>
            </a>
            <a href="{{ url_for('views.products_by_category', category_name='Kids') }}" class="nav-item" title="Kids">
                <i class="fas fa-child"></i><span>Kids</span>
            </a>
            <a href="{{ url_for('views.products_by_category', category_name='Accessories') }}" class="nav-item" title="Accessories">
                <i class="fas fa-gem"></i><span>Accessories</span>
            </a>
            <a href="{{ url_for('views.products_by_category', category_name='Shoes') }}" class="nav-item" title="Shoes">
                <i class="fas fa-shoe-prints"></i><span>Shoes</span>
            </a>
        </div>

        <!-- Search -->
        <form action="{{ url_for('views.search') }}" method="GET" class="search-container">
            <div class="search-bar">
                <input type="text" name="query" id="searchInput" class="search-input" placeholder="Search..." autocomplete="off">
                <button type="submit" class="search-button" aria-label="Search"><i class="fas fa-search"></i></button>
            </div>
            <div id="searchSuggestions" class="search-suggestions" style="display:none;"></div>
        </form>

        <!-- Actions -->
        <div class="nav-actions">
            <a href="/wishlist" class="nav-item nav-icon" title="Wishlist">
                <i class="far fa-heart"></i><span class="badge" id="wishlistCount">0</span>
            </a>
            <a href="/cart" class="nav-item nav-icon" title="Cart">
                <i class="fas fa-shopping-cart"></i><span class="badge" id="cartCount">0</span>
            </a>

            <!-- Account -->
            <div class="dropdown">
                <a href="{{ url_for('auth.account') }}" class="nav-item nav-icon" title="Account">
                    <i class="far fa-user"></i>
                </a>
                <div class="dropdown-content">
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('auth.account') }}" class="dropdown-item"><i class="fas fa-user"></i> My Profile</a>
                        <a href="/orders" class="dropdown-item"><i class="fas fa-box"></i> My Orders</a>
                        <a href="/wishlist" class="dropdown-item"><i class="fas fa-heart"></i> Wishlist</a>
                        <div class="dropdown-divider"></div>
                        {% if current_user.role == 'admin' %}
                            <a href="{{ url_for('admin.admin_dashboard') }}" class="dropdown-item"><i class="fas fa-tachometer-alt"></i> Admin Dashboard</a>
                        {% endif %}
                        <a href="{{ url_for('auth.logout') }}" class="dropdown-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    {% else %}
                        <a href="{{ url_for('auth.login') }}" class="dropdown-item"><i class="fas fa-sign-in-alt"></i> Login</a>
                        <a href="{{ url_for('auth.register') }}" class="dropdown-item"><i class="fas fa-user-plus"></i> Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-item').forEach(item => {
        if (item.getAttribute('href') === currentPath) item.classList.add('active');
    });

    // Hide scrollbar fix
    document.documentElement.style.overflowX = 'hidden';
    document.body.style.overflowX = 'hidden';
});
</script>
