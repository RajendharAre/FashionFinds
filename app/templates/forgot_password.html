<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Fashion Finds</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">
            <a href="{{ url_for('views.homepage') }}">Fashion<span>.finds</span></a>
        </div>
        <div class="auth-card">
            <h2 class="auth-title">Forgot Password</h2>
            <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="auth-alert auth-alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="auth-form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="auth-btn">Send Reset Link</button>
            </form>
            <div class="auth-footer">
                <a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
