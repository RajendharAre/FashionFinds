{% extends 'base.html' %}
{% block title %}Role Approval - Fashion Finds{% endblock %}
{% block content %}
<div class="del-dash-page">
    <div class="del-dash-header">
        <h1><i class="fas fa-user-check"></i> Role Approval Requests</h1>
    </div>
    <div class="del-dash-section">
        <div class="del-table-wrap">
            <table class="del-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>City</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td><strong>#{{ user.id }}</strong></td>
                        <td>{{ user.name }}</td>
                        <td>{{ user.city }}</td>
                        <td>{{ user.role }}</td>
                        <td>
                            <button class="del-btn del-btn-assign" onclick="approve_user('{{ user.id }}')"><i class="fas fa-check"></i> Approve</button>
                            <button class="del-btn del-btn-danger" onclick="reject_user('{{ user.id }}')"><i class="fas fa-times"></i> Reject</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
function approve_user(id) {
    fetch("/admin/approve-user/" + id, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id }),
    })
    .then((response) => { if (response.ok) window.location.reload(); })
    .catch((error) => console.error("Error:", error));
}
function reject_user(id) {
    fetch("/admin/reject-user/" + id, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id }),
    })
    .then((response) => { if (response.ok) window.location.reload(); })
    .catch((error) => console.error("Error:", error));
}
</script>
{% endblock %}
