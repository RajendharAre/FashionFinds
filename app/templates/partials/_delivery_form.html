<form method="POST" class="delivery-apply-form">
    <input type="hidden" name="action" value="apply">
    <h3>Apply Now</h3>

    <div class="apply-form-group">
        <label for="vehicle_type">Vehicle Type *</label>
        <select id="vehicle_type" name="vehicle_type" required>
            <option value="">Select vehicle</option>
            <option value="two-wheeler">Two Wheeler (Bike/Scooter)</option>
            <option value="four-wheeler">Four Wheeler (Car/Van)</option>
            <option value="bicycle">Bicycle</option>
        </select>
    </div>

    <div class="apply-form-group">
        <label for="license_number">Driving License Number *</label>
        <input type="text" id="license_number" name="license_number" placeholder="e.g. DL-1234567890" required>
    </div>

    <div class="apply-form-group">
        <label for="availability">Availability *</label>
        <select id="availability" name="availability" required>
            <option value="">Select availability</option>
            <option value="full-time">Full Time</option>
            <option value="part-time">Part Time</option>
            <option value="weekends">Weekends Only</option>
        </select>
    </div>

    <div class="apply-form-group">
        <label for="experience">Delivery Experience (optional)</label>
        <textarea id="experience" name="experience" rows="3" placeholder="Tell us about any previous delivery experience..."></textarea>
    </div>

    <button type="submit" class="btn-amazon-primary apply-submit-btn">Submit Application</button>
</form>
